# robonix-soma v2 process config (flat schema).
#
# Loaded by `robonix-soma --config <abs path>`. `rbnx boot` derives
# the --config flag from manifest system.soma.config:. CLI flags coming
# from manifest (listen / atlas / provider_id / robot_yaml / log)
# override values here.
#
# Field precedence in SomaConfig::resolve:
#   CLI  >  env  >  config_json  >  this file  >  built-in default
#
# Paths MUST be absolute or relative to this file's directory.
# rbnx spawn_soma_binary does not chdir before forking robonix-soma;
# relative paths are resolved against config_dir via
# SomaConfig::resolve → absolute_path (see robonix/system/soma/src/
# config.rs), so `./soma.yaml` here works regardless of where rbnx was
# launched from. Note: this file is loaded by soma directly with plain
# serde_yaml, it does NOT go through rbnx's ${VAR} expansion — do not
# use env-var syntax here.
#
# See ../robonix/system/soma/README.md for the schema; see
# ../docs/soma_two_stage_bringup.md §12 for why v2 dropped
# deployments / default_robot / start_packages / rbnx_bin.

atlas_endpoint: 127.0.0.1:50051
listen:         127.0.0.1:50091
provider_id:    soma
robot_yaml:     ./soma.yaml
