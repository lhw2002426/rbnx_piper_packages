# skill:
skill:
  # ── Stage 6: pick-up-named-object skill ───────────────────────────
  # The LLM-facing entry point of the whole pipeline. Owns
  # robonix/skill/pick/*. Orchestrates llm_detect + yolo_grasp +
  # piper_moveit into a single user-invocable `pick(object_name)`
  # MCP tool. All upstream calls go over MCP HTTP (atlas-resolved
  # at on_activate time) — no fallback to the legacy ROS service
  # path. See package README for full semantics.
  #
  # Lazy activate: rbnx boot leaves the skill in INITIALIZED state.
  # The executor sends Driver(CMD_ACTIVATE) on the first MCP call,
  # at which point the skill blocks up to 60s waiting for atlas to
  # resolve all three upstream services. So all of llm_detect,
  # yolo_grasp, and piper_moveit MUST be ACTIVE before the user
  # hits this skill — but we don't enforce it at boot order; if
  # they're not ready, the first pick() call fails fast with a clear
  # "missing dependencies" message.
  #
  # Order in this list: skills come AFTER all primitives + services
  # in rbnx boot's spawn order, but pick has no boot-time
  # dependency on its upstreams (lazy-activate sees to that). So
  # the order requirement is "after everything else", which is
  # naturally satisfied by being in the skill: block.
  #
  # 垂直抓取 pipeline 下 pick 的三段动作序列（pre-grasp → grasp →
  # post-grasp）在 feature/vertical-grasp 分支实现；配合
  # yolo_grasp 的 approach_dist 使用。
  #
  - name: pick
    url: https://github.com/lhw2002426/pick_skill_rbnx
    branch: feature/vertical-grasp
    config:
      default_timeout_s:    60.0     # used when caller passes 0
      default_max_retries:  5        # used when caller passes 0

