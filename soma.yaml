# Soma body description for the Piper-arm + Orbbec + grasp deploy.
#
# Loaded by robonix-soma (PR #109 v2 flat schema) and exposed verbatim
# through robonix/system/soma/get_yaml. The URDF referenced under
# `urdf.path` is streamed as-is via robonix/system/soma/get_urdf.
#
# What soma actually parses right now (system/soma/src/store.rs
# MinimalSomaDoc): only `urdf.path` and `robot.id`. Everything else in
# this file is forward-looking — preserved byte-for-byte in get_yaml
# responses so downstream services (footprint / description /
# sensor_extrinsics srvs) can start mining it the moment they ship.
#
# References:
#   - Design:            /Users/howenliu/lab/docs/soma_two_stage_bringup.md §12
#   - Ranger sibling:    /Users/howenliu/lab/ranger_mini_deploy/soma.yaml
#   - Component tree:    matches package_manifest.yaml provider_ids of
#                        orbbec_camera / piper_ctl / piper_description /
#                        easy_handeye2 in /Users/howenliu/lab/packages/*_rbnx/

urdf:
  # Path is resolved relative to this YAML file's directory (soma
  # store.rs::SomaBody::load).
  path: ./urdf/piper.urdf
  root_link: base_link
  model_name: piper

robot:
  id: piper_grasp_01
  display_name: "AgileX Piper 6-DoF arm + Orbbec Dabai DCW RGBD + gripper"
  family: manipulator
  root_part: arm
  dimensions:
    # Piper arm reach envelope. Rough numbers from the AgileX product
    # sheet — refine when a lab measurement is available. Not used by
    # soma v0.1; kept so future footprint srv can serve it.
    length_m: 0.85
    width_m:  0.30
    height_m: 0.40
  mass_kg: 4.2

# Component tree. Stage A: soma v0.1 doesn't parse this — but writing
# it now means stage B/C light up automatically when downstream srvs
# ship.
#
# Naming convention (same as ranger_mini_deploy):
#   - `id` is the semantic name, NOT the URDF link name.
#   - `link` references the URDF link name exactly.
#   - `provided_by[].provider_id` matches an entry in
#     robonix_manifest.yaml's primitive/service/skill lists — that's
#     the contract pilot needs to disambiguate "which arm should pick".
tree:
  id: arm
  part_type: manipulator
  human_label: "AgileX Piper 6-DoF arm, table-mounted"
  link: base_link
  manipulator:
    dof: 6
    base_link: base_link
    end_effector_link: link6
    # Piper joint names as they appear in urdf/piper.urdf.
    joints: [joint1, joint2, joint3, joint4, joint5, joint6]
    # Approximate mechanical envelope — refine from AgileX spec sheet.
    reach_m: 0.75
    max_payload_kg: 1.5
  provided_by:
    - contract: robonix/primitive/arm/joint_states
      provider_id: piper_ctl
    - contract: robonix/primitive/arm/arm_status
      provider_id: piper_ctl
    - contract: robonix/primitive/arm/end_pose
      provider_id: piper_ctl
    - contract: robonix/primitive/arm/pos_cmd
      provider_id: piper_ctl
  children:
    - id: gripper
      part_type: end_effector
      human_label: "Piper factory two-finger parallel gripper (binary open/close)"
      # Gripper links live under link6 in the with-gripper variant of
      # piper_description.urdf. The exact leaf link name depends on
      # which URDF variant is loaded — the vendored one here is
      # piper_description.urdf (with gripper). soma v0.1 ignores this
      # anyway; keep the id/human_label for the LLM to reason about.
      link: link6
      end_effector:
        modality: parallel_jaw
        max_width_m: 0.08
        max_payload_kg: 1.5
      provided_by:
        # piper_ctl's pos_cmd carries gripper state in position[6] +
        # velocity[6] (effort) — no separate provider.
        - contract: robonix/primitive/arm/pos_cmd
          provider_id: piper_ctl

    - id: wrist_camera
      part_type: sensor
      human_label: "Orbbec Dabai DCW eye-in-hand RGBD (link6-mounted, static TF via easy_handeye2)"
      # The realsense/orbbec driver publishes the optical child link
      # `camera_color_optical_frame` itself; easy_handeye2 owns the
      # static edge link6 → camera_color_optical_frame. We anchor the
      # tree at that edge's parent link.
      link: link6
      sensor:
        modality: rgbd
        placement: end_effector_wrist
        # Dabai DCW datasheet numbers — match orbbec_camera's config
        # block in robonix_manifest.yaml.
        resolution: [640, 480]
        framerate_hz: 10
        depth_range_m: [0.2, 3.0]
      provided_by:
        - contract: robonix/primitive/camera/rgb
          provider_id: orbbec_camera
        - contract: robonix/primitive/camera/depth
          provider_id: orbbec_camera
        - contract: robonix/primitive/camera/camera_info
          provider_id: orbbec_camera

description:
  summary: >-
    Table-top manipulation cell. A 6-DoF AgileX Piper arm with a
    factory two-finger parallel gripper, plus an eye-in-hand Orbbec
    Dabai DCW RGBD camera (static TF via easy_handeye2 calibration).
    Currently paired with an OpenVLA client skill that consumes wrist
    RGB + joint proprioception and emits joint-space actions directly
    to the arm (MoveIt bypassed). No mobile base.
  can_do:
    - "Command joint positions on the Piper via primitive/arm/pos_cmd."
    - "Read arm proprioception (joint_states, end_pose, arm_status)."
    - "Capture eye-in-hand RGB + registered depth from the Orbbec Dabai DCW."
    - "Run VLA closed-loop inference at ~2 Hz through the openvla_client service."
  cannot_do:
    - "Drive around — this deploy has no mobile base."
    - "Grasp arbitrary novel objects — yolo_world / yolo_grasp / pick services are commented out in this manifest."
    - "Plan around obstacles — MoveIt is bypassed; the safety net is per-step SDK-unit clipping in openvla_client."
    - "See any scene outside the wrist camera's FOV."
  notes:
    - "The vendored URDF is the WITH-GRIPPER variant (joint1..joint8; joint7/joint8 are the gripper fingers). Override to no-gripper via env PIPER_URDF_PATH in robonix_manifest.yaml if a naked arm is needed."
    - "Hand-eye calibration (link6 → camera_color_optical_frame) is a PLACEHOLDER — see easy_handeye2_rbnx README before relying on grasps."
    - "openvla_client runs against a remote VLA server (http://162.105.88.184:8777); the arm won't move unless that endpoint is reachable."
    - "Soma v2 flat schema: this file is served verbatim; only urdf.path and robot.id are parsed. The tree / description sections are for LLM context via the future soma_bridge MCP adapter."
